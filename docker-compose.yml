version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vocabtrainer-backend
    restart: always
    volumes:
      - ./data:/data          # vocab.db 存放位置
    environment:
      - DATA_DIR=/data
      - SECRET_KEY=change-this-to-a-random-string
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: vocabtrainer-frontend
    restart: always
    ports:
      - "8501:80"
    depends_on:
      - backend
